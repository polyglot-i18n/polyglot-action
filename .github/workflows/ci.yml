name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: GitHub Action Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run format-comment tests
        run: ./tests/test-format-comment.sh

      - name: Run inputs contract tests
        run: ./tests/test-inputs-contract.sh

      # Install the released CLI so the contract test runs against the real
      # `scan`/`coverage --format json` shape the action parses. Best-effort —
      # if the CLI isn't installable the contract test skips (exit 0).
      - name: Install polyglot CLI
        continue-on-error: true
        run: |
          curl -fsSL https://getpolyglot.ai/install.sh | sh || true
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run CLI contract tests (real scan/coverage shape)
        run: ./tests/test-cli-contract.sh
