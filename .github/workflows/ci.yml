name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POLYGLOT_CLI_VERSION: 0.11.0

jobs:
  test:
    name: GitHub Action Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: shellcheck scripts/*.sh tests/*.sh

      - name: Actionlint
        run: >-
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          .github/workflows/*.yml managed-example-workflow.yml

      - name: Run format-comment tests
        run: ./tests/test-format-comment.sh

      - name: Run inputs contract tests
        run: ./tests/test-inputs-contract.sh

      - name: Run fail-closed action tests
        run: ./tests/test-fail-closed.sh

      - name: Run managed runner boundary tests
        run: ./tests/test-managed.sh

      - name: Run managed workflow trust tests
        run: ./tests/test-managed-workflow.sh

      - name: Run publication boundary tests
        run: ./tests/test-publication.sh

      - name: Run installer integrity tests
        run: ./tests/test-installer.sh

      # The real-CLI contract is required: installation or contract drift must
      # fail CI rather than silently skipping the production boundary.
      - name: Install checksum-verified Polyglot CLI
        run: |
          ./scripts/install-cli.sh "$POLYGLOT_CLI_VERSION" "$HOME/.local/bin"
          test "$("$HOME/.local/bin/polyglot" --version)" = "polyglot $POLYGLOT_CLI_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          mkdir -p .test-bin
          cp "$HOME/.local/bin/polyglot" .test-bin/polyglot

      - name: Run differential Action tests
        env:
          POLYGLOT_CLI_BIN: ${{ github.workspace }}/.test-bin/polyglot
        run: ./tests/test-differential.sh

      - name: Run CLI contract tests (real scan/coverage shape)
        run: ./tests/test-cli-contract.sh
