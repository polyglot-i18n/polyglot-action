name: Polyglot managed check

on:
  workflow_call:
    inputs:
      operation:
        description: The allowlisted Polyglot operation to run
        required: false
        default: check
        type: string
      run_id:
        description: An optional dashboard-requested Polyglot run UUID
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  polyglot:
    name: Polyglot / i18n
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate managed operation
        shell: bash
        env:
          POLYGLOT_OPERATION: ${{ inputs.operation }}
          POLYGLOT_REQUESTED_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail
          case "$POLYGLOT_OPERATION" in
            check) ;;
            publish)
              if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ] || [ -z "$POLYGLOT_REQUESTED_RUN_ID" ]; then
                echo "::error::Managed publication requires workflow_dispatch and a backend-created run ID"
                exit 1
              fi
              ;;
            *)
              echo "::error::Managed operation must be check or publish"
              exit 1
              ;;
          esac

      - name: Check out the exact event revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Exchange GitHub identity for a run-scoped credential
        id: managed_auth
        shell: bash
        env:
          POLYGLOT_OPERATION: ${{ inputs.operation }}
          POLYGLOT_REQUESTED_RUN_ID: ${{ inputs.run_id }}
          POLYGLOT_API_URL: https://api.getpolyglot.ai
          POLYGLOT_OIDC_AUDIENCE: https://api.getpolyglot.ai
        run: |
          set -euo pipefail
          oidc_request_url="${ACTIONS_ID_TOKEN_REQUEST_URL:-}"
          oidc_request_token="${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}"
          if [ -z "$oidc_request_url" ] || [ -z "$oidc_request_token" ]; then
            echo "::error::GitHub OIDC is unavailable; verify id-token: write is granted"
            exit 1
          fi

          oidc_response="$(mktemp)"
          exchange_payload="$(mktemp)"
          exchange_response="$(mktemp)"
          trap 'rm -f "$oidc_response" "$exchange_payload" "$exchange_response"' EXIT

          audience="$(jq -rn --arg value "$POLYGLOT_OIDC_AUDIENCE" '$value | @uri')"
          oidc_status="$(curl --proto '=https' --tlsv1.2 -sS \
            -o "$oidc_response" -w '%{http_code}' \
            -H "Authorization: Bearer $oidc_request_token" \
            "${oidc_request_url}&audience=${audience}")"
          if [ "$oidc_status" != "200" ]; then
            echo "::error::GitHub OIDC token request failed (HTTP $oidc_status)"
            exit 1
          fi

          oidc_token="$(jq -er '.value | select(type == "string" and length > 0)' "$oidc_response")"
          jq -n \
            --arg token "$oidc_token" \
            --arg operation "$POLYGLOT_OPERATION" \
            --arg run_id "$POLYGLOT_REQUESTED_RUN_ID" \
            '{schema_version: 1, token: $token, operation: $operation, run_id: $run_id}' \
            > "$exchange_payload"

          exchange_status="$(curl --proto '=https' --tlsv1.2 -sS \
            -o "$exchange_response" -w '%{http_code}' \
            -X POST "$POLYGLOT_API_URL/api/v1/ci/auth/github" \
            -H 'Content-Type: application/json' \
            --data-binary "@$exchange_payload")"

          if [ "$POLYGLOT_OPERATION" = "check" ]; then
            valid_response='.
              | .schema_version == 1 and .token_type == "Bearer" and
                (.token | type == "string" and startswith("pgr_")) and
                (.run_id | type == "string" and length > 0) and
                (.policy_hash | type == "string" and test("^sha256:[0-9a-f]{64}$")) and
                (.operations | index("start")) != null and
                (.operations | index("fetch_policy")) != null and
                (.operations | index("report_check")) != null'
          else
            # $run_id is a jq variable supplied below, not a shell expansion.
            # shellcheck disable=SC2016
            valid_response='.
              | .schema_version == 1 and .token_type == "Bearer" and
                (.token | type == "string" and startswith("pgr_")) and
                .run_id == $run_id and
                (.manifest_hash | type == "string" and test("^sha256:[0-9a-f]{64}$")) and
                (.operations | index("fetch_publish_manifest")) != null and
                (.operations | index("report_publish")) != null'
          fi

          if [ "$exchange_status" != "200" ] ||
            ! jq -e --arg run_id "$POLYGLOT_REQUESTED_RUN_ID" "$valid_response" \
              "$exchange_response" >/dev/null; then
            echo "::error::Polyglot managed authentication failed (HTTP $exchange_status)"
            exit 1
          fi

          run_token="$(jq -r '.token' "$exchange_response")"
          echo "::add-mask::$run_token"
          {
            echo "token=$run_token"
            echo "run_id=$(jq -r '.run_id' "$exchange_response")"
            echo "policy_hash=$(jq -r '.policy_hash // empty' "$exchange_response")"
            echo "manifest_hash=$(jq -r '.manifest_hash // empty' "$exchange_response")"
          } >> "$GITHUB_OUTPUT"

      - name: Run the managed Polyglot check
        if: inputs.operation == 'check'
        uses: polyglot-i18n/polyglot-action@0142fb19d9f8bb45e9474dd871781e0cbb988274
        with:
          api-url: https://api.getpolyglot.ai
          check-mode: differential
          version: 0.11.0
          comment: "false"
          managed-token: ${{ steps.managed_auth.outputs.token }}
          managed-run-id: ${{ steps.managed_auth.outputs.run_id }}
          managed-policy-hash: ${{ steps.managed_auth.outputs.policy_hash }}

      - name: Materialize and verify approved catalogs
        if: inputs.operation == 'publish'
        uses: polyglot-i18n/polyglot-action/publication@afe9c8cd231c5bc0da46e3d8084c97d9922b4355
        with:
          api-url: https://api.getpolyglot.ai
          run-token: ${{ steps.managed_auth.outputs.token }}
          run-id: ${{ steps.managed_auth.outputs.run_id }}
          manifest-hash: ${{ steps.managed_auth.outputs.manifest_hash }}
          version: 0.11.0
