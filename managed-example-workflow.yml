# Copy this file to .github/workflows/polyglot.yml in the connected repository.
# Polyglot deliberately pins the reusable workflow to a complete commit SHA.
name: Polyglot

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      operation:
        description: Polyglot operation
        required: true
        type: choice
        default: check
        options: [check, catalog_sync, publish]
      run_id:
        description: Polyglot dashboard run ID (leave empty for a standalone run)
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: polyglot-${{ github.repository }}-${{ github.ref }}-${{ inputs.operation || 'check' }}
  cancel-in-progress: true

jobs:
  polyglot:
    uses: polyglot-i18n/polyglot-action/.github/workflows/managed.yml@68378ba9e6d69c60a235a214b892936fac53b157
    with:
      operation: ${{ inputs.operation || 'check' }}
      run_id: ${{ inputs.run_id || '' }}
