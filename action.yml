name: 'Polyglot i18n Scanner'
description: 'Detect untranslated strings in your codebase and post a coverage report on PRs'
author: 'Polyglot'

branding:
  icon: 'globe'
  color: 'blue'

inputs:
  api-key:
    description: 'Polyglot API key (POLYGLOT_API_KEY). If empty, the CLI runs in guest mode.'
    required: false
    default: ''
  coverage-threshold:
    description: 'Minimum translation coverage percentage required to pass (0-100). The check fails if average coverage is below this value.'
    required: false
    default: '100'
  config_path:
    description: 'Path to polyglot.toml (default: auto-detect)'
    required: false
    default: ''
  check-mode:
    description: >-
      Check behavior: legacy preserves the v1 full-tree scan/coverage gates;
      differential compares explicit event revisions with `polyglot check`.
    required: false
    default: 'legacy'
  api-url:
    description: 'Polyglot API origin used for authenticated CI run reporting'
    required: false
    default: 'https://api.getpolyglot.ai'
  fail_on_untranslated:
    description: 'Fail the check if untranslated strings are found'
    required: false
    default: 'true'
  comment:
    description: 'Post a PR comment with the scan results'
    required: false
    default: 'true'
  github_token:
    description: 'GitHub token for posting PR comments'
    required: false
    default: ${{ github.token }}
  version:
    description: 'Polyglot CLI version to install (default: latest)'
    required: false
    default: 'latest'
  sync:
    description: >-
      After scanning, run `polyglot push` to sync this repo's existing
      translations into your project's backend memory (so the dashboard stops
      re-translating work you already have). Requires `api-key`. Runs ONLY on a
      push to the repository's default branch — never on pull_request — so
      un-merged PR translations are never written to shared memory.
    required: false
    default: 'false'

outputs:
  total_strings:
    description: 'Total number of untranslated strings found'
    value: ${{ steps.results.outputs.total_strings }}
  files_scanned:
    description: 'Number of files scanned'
    value: ${{ steps.results.outputs.files_scanned }}
  files_with_strings:
    description: 'Number of files with untranslated strings'
    value: ${{ steps.results.outputs.files_with_strings }}
  has_untranslated:
    description: 'Whether untranslated strings were found (true/false)'
    value: ${{ steps.results.outputs.has_untranslated }}
  average_coverage:
    description: 'Average translation coverage percentage across configured languages'
    value: ${{ steps.results.outputs.average_coverage }}

runs:
  using: 'composite'
  steps:
    - name: Resolve Polyglot configuration
      id: config
      shell: bash
      env:
        CONFIG_PATH: ${{ inputs.config_path }}
      run: ${{ github.action_path }}/scripts/resolve-config.sh "$CONFIG_PATH"

    - name: Validate Action inputs
      shell: bash
      env:
        CHECK_MODE: ${{ inputs.check-mode }}
        API_URL: ${{ inputs.api-url }}
      run: ${{ github.action_path }}/scripts/validate-action-inputs.sh "$CHECK_MODE" "$API_URL"

    - name: Resolve immutable check revisions
      if: inputs.check-mode == 'differential'
      id: revisions
      shell: bash
      run: ${{ github.action_path }}/scripts/resolve-revisions.sh "$GITHUB_WORKSPACE"

    - name: Install Polyglot CLI
      shell: bash
      env:
        REQUESTED_VERSION: ${{ inputs.version }}
      run: |
        INSTALL_DIR="$RUNNER_TEMP/polyglot-action/bin"
        ${{ github.action_path }}/scripts/install-cli.sh "$REQUESTED_VERSION" "$INSTALL_DIR"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Run Polyglot scan
      if: inputs.check-mode == 'legacy'
      id: scan
      shell: bash
      env:
        POLYGLOT_API_KEY: ${{ inputs.api-key }}
        WORKING_DIRECTORY: ${{ steps.config.outputs.working_directory }}
      run: ${{ github.action_path }}/scripts/run-scan.sh "$WORKING_DIRECTORY" /tmp/polyglot-scan.json

    - name: Run Polyglot differential check
      if: inputs.check-mode == 'differential' && steps.revisions.outputs.resolution_ok == 'true'
      id: check
      shell: bash
      env:
        POLYGLOT_API_KEY: ${{ inputs.api-key }}
        POLYGLOT_INFORMATIONAL: ${{ steps.revisions.outputs.informational }}
        WORKING_DIRECTORY: ${{ steps.config.outputs.working_directory }}
        BASE_SHA: ${{ steps.revisions.outputs.base_sha }}
        HEAD_SHA: ${{ steps.revisions.outputs.head_sha }}
      run: >-
        ${{ github.action_path }}/scripts/run-check.sh "$WORKING_DIRECTORY"
        "$BASE_SHA" "$HEAD_SHA" /tmp/polyglot-check.json

    - name: Emit differential annotations
      if: inputs.check-mode == 'differential' && steps.check.outputs.result_available == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/emit-annotations.sh /tmp/polyglot-check.json

    - name: Generate PR comment
      if: inputs.check-mode == 'legacy' && inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      run: |
        ${{ github.action_path }}/scripts/format-comment.sh \
          /tmp/polyglot-scan.json \
          "${{ steps.scan.outputs.total_strings }}" \
          "${{ steps.scan.outputs.files_scanned }}" \
          "${{ steps.scan.outputs.files_with_strings }}" \
          > /tmp/polyglot-comment.md

    - name: Generate differential PR comment
      if: >-
        inputs.check-mode == 'differential' && inputs.comment == 'true' &&
        github.event_name == 'pull_request' && steps.check.outputs.result_available == 'true'
      shell: bash
      run: >-
        ${{ github.action_path }}/scripts/format-check-comment.sh
        /tmp/polyglot-check.json > /tmp/polyglot-comment.md

    - name: Post or update PR comment
      if: >-
        inputs.comment == 'true' && github.event_name == 'pull_request' &&
        (inputs.check-mode == 'legacy' || steps.check.outputs.result_available == 'true')
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('/tmp/polyglot-comment.md', 'utf8');
          const marker = '<!-- polyglot-scan-report -->';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: marker + '\n' + body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: marker + '\n' + body,
            });
          }

    - name: Check coverage threshold
      if: inputs.check-mode == 'legacy'
      id: coverage
      shell: bash
      env:
        POLYGLOT_API_KEY: ${{ inputs.api-key }}
        WORKING_DIRECTORY: ${{ steps.config.outputs.working_directory }}
        COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
      run: ${{ github.action_path }}/scripts/run-coverage.sh "$WORKING_DIRECTORY" "$COVERAGE_THRESHOLD"

    - name: Report differential run metadata
      if: always() && inputs.check-mode == 'differential' && inputs.api-key != ''
      shell: bash
      env:
        POLYGLOT_API_KEY: ${{ inputs.api-key }}
        POLYGLOT_API_URL: ${{ inputs.api-url }}
        POLYGLOT_BASE_SHA: ${{ steps.revisions.outputs.base_sha }}
        POLYGLOT_HEAD_SHA: ${{ steps.revisions.outputs.head_sha }}
        POLYGLOT_BRANCH: ${{ steps.revisions.outputs.branch }}
        POLYGLOT_REF: ${{ steps.revisions.outputs.ref }}
        POLYGLOT_PULL_REQUEST_NUMBER: ${{ steps.revisions.outputs.pull_request_number }}
        POLYGLOT_LIFECYCLE_STATUS: ${{ cancelled() && 'cancelled' || 'completed' }}
        POLYGLOT_RESULT_AVAILABLE: ${{ steps.check.outputs.result_available || 'false' }}
        POLYGLOT_CONCLUSION: ${{ cancelled() && 'cancelled' || (steps.check.outputs.conclusion || 'action_required') }}
        POLYGLOT_STARTED_AT: ${{ steps.check.outputs.started_at }}
        POLYGLOT_DURATION_MS: ${{ steps.check.outputs.duration_ms }}
        POLYGLOT_ERROR_CODE: ${{ steps.check.outputs.error_code || steps.revisions.outputs.error_code || 'action_not_completed' }}
        POLYGLOT_ERROR_MESSAGE: ${{ steps.check.outputs.error_message || steps.revisions.outputs.error_message || 'Polyglot check did not complete' }}
      run: ${{ github.action_path }}/scripts/report-run.sh /tmp/polyglot-check.json

    - name: Normalize Action outputs
      if: always()
      id: results
      shell: bash
      env:
        CHECK_MODE: ${{ inputs.check-mode }}
        LEGACY_TOTAL: ${{ steps.scan.outputs.total_strings }}
        LEGACY_FILES: ${{ steps.scan.outputs.files_scanned }}
        LEGACY_FILES_WITH: ${{ steps.scan.outputs.files_with_strings }}
        LEGACY_HAS_UNTRANSLATED: ${{ steps.scan.outputs.has_untranslated }}
        LEGACY_AVERAGE: ${{ steps.coverage.outputs.average_coverage }}
        CHECK_TOTAL: ${{ steps.check.outputs.total_strings }}
        CHECK_FILES: ${{ steps.check.outputs.files_scanned }}
        CHECK_FILES_WITH: ${{ steps.check.outputs.files_with_strings }}
        CHECK_HAS_UNTRANSLATED: ${{ steps.check.outputs.has_untranslated }}
        CHECK_AVERAGE: ${{ steps.check.outputs.average_coverage }}
      run: |
        if [ "$CHECK_MODE" = "differential" ]; then
          {
            echo "total_strings=${CHECK_TOTAL:-0}"
            echo "files_scanned=${CHECK_FILES:-0}"
            echo "files_with_strings=${CHECK_FILES_WITH:-0}"
            echo "has_untranslated=${CHECK_HAS_UNTRANSLATED:-false}"
            echo "average_coverage=${CHECK_AVERAGE:-0}"
          } >> "$GITHUB_OUTPUT"
        else
          {
            echo "total_strings=${LEGACY_TOTAL:-0}"
            echo "files_scanned=${LEGACY_FILES:-0}"
            echo "files_with_strings=${LEGACY_FILES_WITH:-0}"
            echo "has_untranslated=${LEGACY_HAS_UNTRANSLATED:-false}"
            echo "average_coverage=${LEGACY_AVERAGE:-}"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Enforce differential result
      if: always() && inputs.check-mode == 'differential'
      shell: bash
      env:
        RESOLUTION_OK: ${{ steps.revisions.outputs.resolution_ok }}
        CHECK_EXIT: ${{ steps.check.outputs.exit_code }}
      run: |
        if [ "$RESOLUTION_OK" != "true" ]; then
          echo "::error::Polyglot could not resolve the required base/head revisions."
          exit 2
        fi
        case "$CHECK_EXIT" in
          0) exit 0 ;;
          1) echo "::error::Polyglot differential policy failed."; exit 1 ;;
          *) echo "::error::Polyglot analysis was incomplete."; exit 2 ;;
        esac

    - name: Check result
      if: inputs.check-mode == 'legacy' && inputs.fail_on_untranslated == 'true'
      shell: bash
      run: |
        if [ "${{ steps.scan.outputs.has_untranslated }}" = "true" ]; then
          echo "::error::Found ${{ steps.scan.outputs.total_strings }} untranslated string(s)"
          exit 1
        fi

    # Post-merge sync (opt-in). Gated to a push on the default branch so it never
    # writes un-merged PR translations into shared memory. `always()` lets it run
    # even when the coverage/untranslated gates above failed — a merge has landed,
    # so the repo's translations should reach memory regardless.
    - name: Sync translations to project memory
      id: sync
      if: >-
        always() && inputs.sync == 'true' && github.event_name == 'push' &&
        github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      shell: bash
      env:
        POLYGLOT_API_KEY: ${{ inputs.api-key }}
        WORKING_DIRECTORY: ${{ steps.config.outputs.working_directory }}
      run: |
        if [ -z "$POLYGLOT_API_KEY" ]; then
          echo "::warning::sync is enabled but no api-key was provided — skipping (polyglot push needs authentication)."
          exit 0
        fi
        echo "Syncing this repo's existing translations into your project's memory..."
        cd "$WORKING_DIRECTORY"
        polyglot push
