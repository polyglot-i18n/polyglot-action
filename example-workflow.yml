# Example: .github/workflows/polyglot.yml
#
# Brownfield-safe differential checks for pull requests, merge queues, and the
# default branch. Existing untranslated strings are allowed; new ones fail.

name: i18n Check

on:
  pull_request:
    branches: [main]
    # No `paths:` filter on purpose: translation gaps often arrive as
    # catalog-only changes (messages/*.json), which a src-only filter would
    # silently skip — the check must run on every PR.
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Polyglot i18n Check
        uses: polyglot-i18n/polyglot-action@v1
        with:
          api-key: ${{ secrets.POLYGLOT_API_KEY }}
          check-mode: differential
          version: '0.10.0'
          comment: 'false'
