# Example: .github/workflows/polyglot.yml
#
# Runs Polyglot i18n scanner on pull requests and posts a comment
# with the translation coverage report.

name: i18n Check

on:
  pull_request:
    branches: [main]
    # No `paths:` filter on purpose: translation gaps often arrive as
    # catalog-only changes (messages/*.json), which a src-only filter would
    # silently skip — the check must run on every PR to gate coverage.

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Polyglot i18n Scan
        uses: polyglot-i18n/polyglot-action@v1
        with:
          api-key: ${{ secrets.POLYGLOT_API_KEY }}
          coverage-threshold: '100'
          fail_on_untranslated: 'true'
          comment: 'true'
